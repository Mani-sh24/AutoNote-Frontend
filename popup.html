<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScribeWave</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <header class="hero">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div>
          <p class="eyebrow">TAB TRANSCRIBER</p>
          <h1>ScribeWave</h1>
        </div>
      </div>
      <p class="subtitle">Turn the audio in your active tab into useful notes.</p>
    </header>

    <section class="capture-card" aria-label="Capture controls">
      <div class="status-row">
        <div id="status-pill" class="status-pill idle">
          <span class="dot" aria-hidden="true"></span>
          <span id="state-label">Ready</span>
        </div>
        <div class="waves" id="waves" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
      </div>
      <p id="status" class="status-message" aria-live="polite">Ready to capture a tab</p>
      <p id="error" class="error-message" hidden></p>
      <div class="button-row">
        <button id="start" class="primary">Start capture</button>
        <button id="stop" class="secondary" disabled>Stop</button>
      </div>
    </section>

    <section class="result-card" aria-label="Summary">
      <div class="section-heading">
        <h2>Summary</h2>
        <span id="summary-hint">Appears here after capture</span>
      </div>
      <textarea id="summary" readonly placeholder="Your summary will arrive here, even if you close this window while recording."></textarea>
      <div class="result-actions">
        <button id="copy-summary" class="ghost" disabled>Copy text</button>
        <button id="download-summary" class="ghost" disabled>Download</button>
      </div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
